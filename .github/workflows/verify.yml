name: MERN Fitness Tracker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Backend Dependencies
        run: |
          cd server
          npm install
      - name: Check Backend Build & Syntax
        run: |
          cd server
          node --check index.js

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Frontend Dependencies
        run: |
          cd client
          npm install
      - name: Build Frontend
        run: |
          cd client
          CI=false npm run build
